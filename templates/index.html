<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h2>CRM Dashboard</h2>

<div class="top-bar">
<a href="/add">Add</a>

<form>
<input type="text" name="search" placeholder="Search">
<button>Search</button>
</form>

<a href="/logout">Logout</a>
</div>

<h3>Total Customers: {{ total }}</h3>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Action</th>
</tr>

{% for c in customers %}
<tr>
<td>{{c.id}}</td>
<td>{{c.name}}</td>
<td>{{c.email}}</td>
<td>{{c.phone}}</td>
<td>
<a href="/edit/{{c.id}}">Edit</a>
<a href="/delete/{{c.id}}">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
