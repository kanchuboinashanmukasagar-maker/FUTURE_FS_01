<!DOCTYPE html>
<html>
<head>
    <title>CRM Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>CRM Dashboard</h2>

    <div class="top-bar">
        <a href="/add" class="button add-btn">+ Add Customer</a>

        <form method="GET">
            <input type="text" name="search" placeholder="Search...">
            <button type="submit">Search</button>
        </form>

        <a href="/logout" class="button delete-btn">Logout</a>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h3>{{ total }}</h3>
            <p>Total Customers</p>
        </div>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>
        </tr>

        {% for c in customers %}
        <tr>
            <td>{{c[0]}}</td>
            <td>{{c[1]}}</td>
            <td>{{c[2]}}</td>
            <td>{{c[3]}}</td>
            <td>
                <a href="/edit/{{c[0]}}" class="button edit-btn">Edit</a>
                <a href="/delete/{{c[0]}}" class="button delete-btn">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
